<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 Games Collection</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Elite Gaming  0750 123 8780 </h1>
</header>

<section class="info">

    <div class="box-wrapper">
        <div class="box line-style">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <span id="totalSize"></span>
            </div>
        </div>

        <div class="box">
            <h3>بۆ ئەو یاریانە پێویستت بە</h3>
            <span id="storage">64GB Flash Drive</span>
        </div>
    </div>

    <div class="buttons">
        <button id="clearSelection">
            لابردنی یاریە دیاریکراوەکان
        </button>

        <button id="myGames">
            ئەو یاریانەی دیاریکراون
        </button>
    </div>

</section>

<section id="gamesContainer">

</section>

<!-- Fixed: Only load each script once -->
<script src="game.js"></script>
<script src="script.js"></script>

</body>
</html>
